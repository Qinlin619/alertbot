<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlertBot - 灾害警报</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="iphone-frame">
        <div class="screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <div class="left">Movistar</div>
                <div class="right">
                    <span class="signal">📶</span>
                    <span class="wifi">📶</span>
                    <span class="battery">🔋</span>
                </div>
            </div>

            <!-- Lock Screen Content -->
            <div class="lock-screen-content">
                <div class="date-time">
                    <div class="date" id="current-date">3月2日周一 · 丙午年正月十四</div>
                    <div class="time" id="current-time">04:14</div>
                </div>

                <!-- Alert Notification -->
                <div class="alert-notification" id="alert">
                    <div class="alert-header">
                        Attention <span class="emoji">❗❗</span>
                    </div>
                    <div class="map-container">
                        <div class="danger-zone"></div>
                        <div class="user-marker">MA</div>
                    </div>
                    <div class="alert-body">
                        An active wildfire is moving rapidly toward your current location. Evacuate immediately to the
                        North-East toward the established safe zone at Central Stadium.
                    </div>
                </div>

                <!-- Bottom Controls -->
                <div class="bottom-controls">
                    <div class="icon-btn flashlight">🔦</div>
                    <div class="dnd-mode">🌙 勿扰模式</div>
                    <div class="icon-btn camera">📷</div>
                </div>
                <!-- Home Indicator -->
                <div class="home-indicator"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
